<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Attendance</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#28a745">
  <link rel="apple-touch-icon" href="logo.png">
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
    .logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; }
    h2 { color: #1c1e21; margin-top: 0; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; text-align: center; }
    button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    
    /* Button Colors */
    .btn-p { background-color: #28a745; }
    .btn-do { background-color: #ffc107; color: #333; }
    .btn-sl { background-color: #dc3545; }
    .btn-out { background-color: #343a40; margin-top: 20px; font-size: 18px; padding: 15px;}
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    
    #status { margin-top: 20px; font-size: 14px; font-weight: 500; min-height: 40px; }
    .loading { color: #007bff; }

    /* New Timer Section Styles */
    #timerSection { display: none; }
    .welcome-text { font-size: 18px; color: #555; margin-bottom: 10px; font-weight: bold;}
    .timer-display { font-size: 42px; font-weight: bold; color: #1c1e21; margin: 15px 0; font-family: monospace; letter-spacing: 2px;}
    .sub-text { font-size: 12px; color: #888; margin-bottom: 20px;}
    
    /* Login Section */
    #loginSection { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Shop Logo" class="logo" onerror="this.style.display='none'">
    <h2>Staff Attendance</h2>

    <div id="loginSection">
      <input type="password" id="pinInput" placeholder="Enter Your PIN" pattern="[0-9]*" inputmode="numeric">
      <button class="btn-p" onclick="handleAction('P')">CLOCK IN (Present)</button>
      <button class="btn-do" onclick="handleAction('DO')">DAY OFF (DO)</button>
      <button class="btn-sl" onclick="handleAction('SL')">SICK LEAVE (SL)</button>
    </div>

    <div id="timerSection">
      <div class="welcome-text">Shift in Progress</div>
      <div id="countdownTimer" class="timer-display">09:00:00</div>
      <div class="sub-text">Remaining Time</div>
      <button class="btn-out" onclick="handleAction('CLOCK_OUT')">CLOCK OUT</button>
    </div>
    
    <div id="status"></div>
  </div>

  <script>
    // Your specific Google Apps Script URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyY8FOXHSov5r30GiTIg2SfaxmtzywBHiAJs4PK8m-9RcZhDeD9bdpcKr16lihmFPkDew/exec";
    let timerInterval = null;

    // 1. App එක Load වෙද්දී Session එකක් තියෙනවද බලනවා
    window.onload = function() {
      checkActiveSession();
    };

    function checkActiveSession() {
      const activePin = localStorage.getItem('activePin');
      const clockInTime = localStorage.getItem('clockInTime');
      
      if (activePin && clockInTime) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('timerSection').style.display = 'block';
        document.getElementById('status').innerText = "";
        startTimer(parseInt(clockInTime));
      } else {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('timerSection').style.display = 'none';
      }
    }

    function startTimer(startTimeMs) {
      if (timerInterval) clearInterval(timerInterval);
      
      const nineHoursMs = 9 * 60 * 60 * 1000;
      const targetTimeMs = startTimeMs + nineHoursMs;

      function updateTimer() {
        const now = Date.now();
        const diffMs = targetTimeMs - now;

        if (diffMs <= 0) {
          document.getElementById('countdownTimer').innerText = "00:00:00";
          document.getElementById('countdownTimer').style.color = "#dc3545";
          return;
        }

        const h = Math.floor(diffMs / (1000 * 60 * 60));
        const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diffMs % (1000 * 60)) / 1000);
        
        document.getElementById('countdownTimer').innerText = 
          String(h).padStart(2, '0') + ":" + 
          String(m).padStart(2, '0') + ":" + 
          String(s).padStart(2, '0');
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    async function getPublicIp() {
      try {
        const response = await fetch('https://api64.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (err) {
        return "Unknown";
      }
    }

    async function handleAction(actionType) {
      const statusDiv = document.getElementById('status');
      const buttons = document.querySelectorAll('button');
      
      // Action එක Clock-Out නම් PIN එක ගන්නේ localStorage එකෙන්, නැත්නම් input box එකෙන්
      let pin = (actionType === 'CLOCK_OUT') ? localStorage.getItem('activePin') : document.getElementById('pinInput').value;

      if (!pin) {
        statusDiv.style.color = "red";
        statusDiv.innerText = "Please enter your PIN.";
        return;
      }

      buttons.forEach(b => b.disabled = true);
      statusDiv.className = "loading";
      statusDiv.style.color = "#007bff";
      statusDiv.innerText = "Verifying details...";

      const userIp = await getPublicIp();
      const payload = { pin: pin, action: actionType, userIp: userIp };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        const resultText = await response.text();
        
        statusDiv.className = "";
        statusDiv.style.color = resultText.includes("Success") ? "green" : "red";
        statusDiv.innerText = resultText;
        
        if (resultText.includes("Success")) {
          // Clock-In වුණාම Data Save කරලා UI එක මාරු කරනවා
          if (actionType === 'P') {
            document.getElementById('pinInput').value = "";
            localStorage.setItem('activePin', pin);
            localStorage.setItem('clockInTime', Date.now());
            setTimeout(checkActiveSession, 1500); // පොඩි delay එකකින් පස්සේ UI එක මාරු වෙනවා
          }
          // Clock-Out වුණාම Data මකලා ආයේ Login එකට එනවා
          else if (actionType === 'CLOCK_OUT') {
            localStorage.removeItem('activePin');
            localStorage.removeItem('clockInTime');
            if (timerInterval) clearInterval(timerInterval);
            setTimeout(checkActiveSession, 2000);
          }
          // DO හෝ SL නම් input එක විතරක් clear කරනවා
          else {
             document.getElementById('pinInput').value = "";
          }
        }
      } catch (error) {
        statusDiv.className = "";
        statusDiv.style.color = "red";
        statusDiv.innerText = "Network Error. Please try again.";
      } finally {
        buttons.forEach(b => b.disabled = false);
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Register Failed", err));
    }
  </script>
</body>
</html>
